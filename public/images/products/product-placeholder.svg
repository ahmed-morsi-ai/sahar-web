<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Sahar product placeholder</title>
  <desc id="desc">A luxury perfume bottle placeholder for missing product imagery.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#26392d"/>
      <stop offset="42%" stop-color="#15140f"/>
      <stop offset="100%" stop-color="#070706"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1c8"/>
      <stop offset="45%" stop-color="#d5a95e"/>
      <stop offset="100%" stop-color="#8d6530"/>
    </linearGradient>
    <linearGradient id="glass" x1="20%" x2="80%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7dc" stop-opacity=".34"/>
      <stop offset="44%" stop-color="#d7b978" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#090807" stop-opacity=".48"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" values="1 0 0 0 0.87 0 1 0 0 0.67 0 0 1 0 0.35 0 0 0 .55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="600" cy="495" r="360" fill="#163629" opacity=".22"/>
  <circle cx="600" cy="520" r="258" fill="none" stroke="#d5a95e" stroke-opacity=".16" stroke-width="3"/>
  <g filter="url(#glow)">
    <rect x="495" y="240" width="210" height="78" rx="18" fill="url(#gold)"/>
    <rect x="535" y="315" width="130" height="96" rx="18" fill="#16130d" stroke="#d5a95e" stroke-opacity=".42" stroke-width="5"/>
    <path d="M420 460c0-42 34-76 76-76h208c42 0 76 34 76 76v395c0 54-44 98-98 98H518c-54 0-98-44-98-98V460Z" fill="url(#glass)" stroke="#d5a95e" stroke-opacity=".62" stroke-width="8"/>
    <path d="M476 505c0-30 24-54 54-54h140c30 0 54 24 54 54v289c0 38-31 69-69 69H545c-38 0-69-31-69-69V505Z" fill="#0f0d0a" opacity=".55"/>
    <text x="600" y="638" text-anchor="middle" fill="#e7c58d" font-family="Georgia, 'Times New Roman', serif" font-size="86" letter-spacing="12">SAHAR</text>
    <text x="600" y="704" text-anchor="middle" fill="#f7dfad" opacity=".7" font-family="Arial, sans-serif" font-size="22" letter-spacing="10">ESSENCE OF NIGHT</text>
  </g>
</svg>
